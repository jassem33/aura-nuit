[build]
  command = "npm run build"
  publish = ".next"

# Domaines distants autorisés pour Netlify Image CDN (/_next/image).
# Sans cette liste, Netlify renvoie 404 pour toute image hors du domaine du site.
[images]
  remote_images = [
    "https://utfs.io/.*",
    "https://.*\\.ufs\\.sh/.*",
    "https://.*\\.supabase\\.co/.*",
  ]
